name: Daily Brief

on:
  workflow_dispatch:        # 唯一觸發：cron-job.org 準點呼叫（見 docs/SETUP.md）
                            # 已移除 GitHub 內建 schedule：它會延遲、且與 cron-job.org 重複觸發製造紅叉噪音

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 當日報告若已存在，整個 job 綠燈跳過（避免重複觸發造成紅叉）
      - name: Skip if today already done
        id: guard
        run: |
          DATE=$(TZ=Asia/Taipei date +%F)
          F="reports/${DATE:0:4}/${DATE:5:2}/${DATE}.json"
          if [ -f "$F" ]; then
            echo "已存在 $F，跳過本次生成"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "尚無 $F，繼續生成"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.guard.outputs.skip == 'false'
        run: pip install --quiet requests feedparser

      - name: Fetch sources
        if: steps.guard.outputs.skip == 'false'
        run: python scripts/fetch_sources.py

      - name: Generate report
        if: steps.guard.outputs.skip == 'false'
        env:
          PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}   # 留空即用腳本內現行 flash 候選；要固定型號才設此 variable
        run: python scripts/generate_report.py

      - name: Commit & push
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name "ai-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports archive.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "每日快報 $(TZ=Asia/Taipei date +%F)"
            git pull --rebase origin main
            git push
          fi
