name: Daily Brief

on:
  workflow_dispatch:        # 唯一觸發：cron-job.org 準點呼叫（見 docs/SETUP.md）
                            # 已移除 GitHub 內建 schedule：它會延遲、且與 cron-job.org 重複觸發製造紅叉噪音

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 當日報告若已存在，整個 job 綠燈跳過（避免重複觸發造成紅叉）
      - name: Skip if today already done
        id: guard
        run: |
          DATE=$(TZ=Asia/Taipei date +%F)
          F="reports/${DATE:0:4}/${DATE:5:2}/${DATE}.json"
          if [ -f "$F" ]; then
            echo "已存在 $F，跳過本次生成"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "尚無 $F，繼續生成"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.guard.outputs.skip == 'false'
        run: pip install --quiet requests feedparser

      - name: Fetch sources
        if: steps.guard.outputs.skip == 'false'
        run: python scripts/fetch_sources.py

      - name: Generate report
        if: steps.guard.outputs.skip == 'false'
        env:
          PROVIDER: gemini,claude          # 主用 Gemini（免費），失敗自動退到 Claude（付費、穩定）
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}       # 留空即用腳本內現行 flash 候選
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}        # 留空預設 claude-haiku-4-5
        run: python scripts/generate_report.py

      - name: Commit & push
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name "ai-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports archive.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "每日快報 $(TZ=Asia/Taipei date +%F)"
            git pull --rebase origin main
            git push
          fi

      # 成功：推播一句話快訊 + 當日快報連結
      - name: Notify Telegram (success)
        if: steps.guard.outputs.skip == 'false' && success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SITE_URL: ${{ vars.SITE_URL || 'https://sakuradigi.github.io/ai-daily-brief' }}
        run: python scripts/notify.py

      # 失敗：同一個 bot 通知，附 Actions run 連結（用 curl，即使前面 python 步驟掛了也能送）
      - name: Notify Telegram (failure)
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT" ]; then
            echo "SKIP failure notify: 未設 Telegram secrets"; exit 0
          fi
          DATE=$(TZ=Asia/Taipei date +%F)
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode "text=⚠️ AI 時事快報 產製失敗（${DATE}）
請查 Actions log：${RUN_URL}" >/dev/null || true
