name: Daily Brief

on:
  workflow_dispatch:        # 主要觸發：cron-job.org 準點呼叫（見 docs/SETUP.md）
  schedule:
    - cron: "30 23 * * *"   # 備援：UTC 23:30 = 台北 07:30（GitHub cron 可能延遲，僅保底）

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet requests feedparser

      - name: Fetch sources
        run: python scripts/fetch_sources.py

      - name: Generate report
        env:
          PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}   # 留空即用腳本內現行 flash 候選；要固定型號才設此 variable
        run: python scripts/generate_report.py

      - name: Commit & push
        run: |
          git config user.name "ai-daily-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports archive.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "每日快報 $(TZ=Asia/Taipei date +%F)"
            git pull --rebase origin main
            git push
          fi
